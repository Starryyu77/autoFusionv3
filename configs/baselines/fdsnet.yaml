# FDSNet (Feature Divergence Selection Network)
# 参考论文: FDSNet - Multimodal Dynamic Fusion (Nature 2025)

experiment:
  name: "fdsnet"
  description: "Feature Divergence Selection Network with learnable divergence weights"
  paper: "Nature 2025"

# FDSNet特定配置
model:
  hidden_dim: 256
  dropout: 0.2
  # 分歧矩阵学习率（相对于主学习率）
  divergence_lr_scale: 0.1
  # KL散度平滑系数
  kl_smooth: 1e-8
  # 分歧温度系数
  divergence_temperature: 1.0

# 训练配置
training:
  optimizer: "Adam"
  learning_rate: 0.001
  weight_decay: 0.0001

  scheduler: "reduce_on_plateau"
  scheduler_patience: 10
  scheduler_factor: 0.5

  epochs: 100
  batch_size: 64

  early_stop:
    enabled: true
    patience: 20
    min_delta: 0.001

  gradient_clip:
    enabled: true
    max_norm: 1.0

# 评估配置
evaluation:
  num_seeds: 5
  seeds: [42, 123, 456, 789, 1024]

  modality_dropout:
    probabilities: [0.0, 0.25, 0.50]
    modes: ["random"]

# 数据集配置
datasets:
  mosei:
    path: "data/mosei_processed"
    num_classes: 10
    input_dims:
      vision: 35
      audio: 74
      text: 300

  iemocap:
    path: "data/iemocap_processed"
    num_classes: 9
    input_dims:
      vision: 35
      audio: 74
      text: 300

  vqa:
    path: "data/vqa_processed"
    num_classes: 3129
    input_dims:
      vision: 35
      text: 300
    batch_size: 128
