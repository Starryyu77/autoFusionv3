# 简单基线方法统一配置
# MeanFusion, ConcatFusion, AttentionFusion, MaxFusion

experiment:
  name: "simple_baselines"
  description: "Simple baseline methods for multimodal fusion"
  methods: ["mean", "concat", "attention", "max"]

# 模型配置
model:
  hidden_dim: 256
  dropout: 0.2

# 训练配置 - 标准Adam优化
training:
  optimizer: "Adam"
  learning_rate: 0.001
  weight_decay: 0.0001

  scheduler: "reduce_on_plateau"
  scheduler_patience: 10
  scheduler_factor: 0.5

  epochs: 100
  batch_size: 64

  early_stop:
    enabled: true
    patience: 20
    min_delta: 0.001
    monitor: "val_accuracy"

  gradient_clip:
    enabled: true
    max_norm: 1.0

# 评估配置
evaluation:
  num_seeds: 5
  seeds: [42, 123, 456, 789, 1024]

  modality_dropout:
    probabilities: [0.0, 0.25, 0.50]
    modes: ["random"]

  metrics:
    - accuracy
    - f1_score
    - precision
    - recall

# 数据集特定配置
datasets:
  mosei:
    path: "data/mosei/mosei_senti_data.pkl"
    num_classes: 10
    # 原始特征维度
    input_dims:
      vision: 35
      audio: 74
      text: 300

  iemocap:
    path: "data/iemocap/iemocap_data.pkl"
    num_classes: 9
    input_dims:
      vision: 35
      audio: 74
      text: 300

  vqa:
    path: "data/vqa_v2"
    num_classes: 3129
    input_dims:
      vision: 2048
      text: 300
    # VQA类别数多，使用更大batch
    batch_size: 128
