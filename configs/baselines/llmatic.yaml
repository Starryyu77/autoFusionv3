# LLMatic (LLM + Quality Diversity NAS)
# 参考论文: LLMatic - Neuroevolution through the lens of Large Language Models (GECCO 2024)

experiment:
  name: "llmatic"
  description: "LLM-driven architecture search with quality diversity"
  paper: "GECCO 2024"

# LLMatic特定配置
model:
  hidden_dim: 256
  dropout: 0.2

# LLM搜索配置
search:
  enabled: true
  # MAP-Elites参数
  population_size: 10
  num_iterations: 20
  behavior_bins: 5

  # LLM生成参数
  llm:
    backend: "aliyun"
    model: "kimi-k2.5"
    temperature: 0.8
    max_tokens: 2048

  # 行为描述符范围
  behavior_ranges:
    accuracy: [0.0, 1.0]
    flops: [0, 50000000]

  # 父代选择策略
  parent_selection: "diverse"
  num_parents: 2

# 训练配置
training:
  optimizer: "Adam"
  learning_rate: 0.001
  weight_decay: 0.0001

  scheduler: "reduce_on_plateau"
  scheduler_patience: 10
  scheduler_factor: 0.5

  # 搜索+训练总epoch
  epochs: 100
  batch_size: 64

  early_stop:
    enabled: true
    patience: 20
    min_delta: 0.001

  gradient_clip:
    enabled: true
    max_norm: 1.0

# 评估配置
evaluation:
  num_seeds: 3  # LLMatic搜索成本高，使用较少种子
  seeds: [42, 123, 456]

  # 评估最佳架构和多样性
  evaluate_archive: true

  modality_dropout:
    probabilities: [0.0, 0.25, 0.50]
    modes: ["random"]

# 数据集配置
datasets:
  mosei:
    path: "data/mosei_processed"
    num_classes: 10
    input_dims:
      vision: 35
      audio: 74
      text: 300

  iemocap:
    path: "data/iemocap_processed"
    num_classes: 9
    input_dims:
      vision: 35
      audio: 74
      text: 300

  vqa:
    path: "data/vqa_processed"
    num_classes: 3129
    input_dims:
      vision: 35
      text: 300
    batch_size: 128
