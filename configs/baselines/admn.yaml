# ADMN (Adaptive Dynamic Multimodal Network)
# 参考论文: Adaptive Dynamic Multimodal Network (NeurIPS 2025)

experiment:
  name: "admn"
  description: "Adaptive Dynamic Multimodal Network with hierarchical processing"
  paper: "NeurIPS 2025"

# ADMN特定配置
model:
  hidden_dim: 256
  dropout: 0.2
  # 层级数量
  num_layers: 3
  # 自适应跳过阈值
  skip_threshold: 0.6
  # 控制器输出维度
  controller_dim: 64

# 训练配置
training:
  optimizer: "Adam"
  learning_rate: 0.001
  weight_decay: 0.0001

  scheduler: "reduce_on_plateau"
  scheduler_patience: 10
  scheduler_factor: 0.5

  epochs: 100
  batch_size: 64

  early_stop:
    enabled: true
    patience: 20
    min_delta: 0.001

  gradient_clip:
    enabled: true
    max_norm: 1.0

# 评估配置
evaluation:
  num_seeds: 5
  seeds: [42, 123, 456, 789, 1024]

  modality_dropout:
    probabilities: [0.0, 0.25, 0.50]
    modes: ["random"]

# 数据集配置
datasets:
  mosei:
    path: "data/mosei_processed"
    num_classes: 10
    input_dims:
      vision: 768
      audio: 1024
      text: 768

  iemocap:
    path: "data/iemocap_processed"
    num_classes: 9
    input_dims:
      vision: 768
      audio: 1024
      text: 768

  vqa:
    path: "data/vqa_processed"
    num_classes: 3129
    input_dims:
      vision: 768
      text: 768
    batch_size: 128
