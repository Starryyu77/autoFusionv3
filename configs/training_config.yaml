# EAS训练配置
# 所有实验必须使用这些超参数，确保可比性

training:
  # 优化器设置
  optimizer: "AdamW"
  learning_rate: 0.001
  weight_decay: 0.01

  # 学习率调度
  scheduler: "cosine"
  warmup_epochs: 2

  # 训练设置
  epochs: 15
  batch_size: 32

  # 早停
  early_stop:
    enabled: true
    patience: 5
    min_delta: 0.001
    monitor: "val_accuracy"

  # 梯度裁剪
  gradient_clip:
    enabled: true
    max_norm: 1.0

  # 混合精度训练 (节省显存)
  mixed_precision: true

  # 确定性训练 (确保可重复)
  deterministic: true
  benchmark: false

evaluation:
  # Few-shot评估
  num_shots: 64
  eval_interval: 1  # 每轮评估

  # 评估指标
  metrics:
    - accuracy
    - f1_score
    - precision
    - recall

  # 模态缺失评估
  modality_dropout:
    probabilities: [0.0, 0.25, 0.5]
    modes: ["random", "burst", "progressive"]

  # 重复次数
  num_seeds: 5
  seeds: [42, 123, 456, 789, 1024]
